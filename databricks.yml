bundle:
  name: dbx-finance-ecosystem

include:
  - resources/*.yml
  - jobs/*.yml

variables:
  catalog:
    description: Unity Catalog name for this project
    default: horizontal_finance

  schema_raw:
    description: Raw landing zone — managed volume holds files from all source systems
    default: raw_data
  schema_bronze_ariba:
    description: Bronze tables shaped like SAP Ariba native exports
    default: bronze_ariba
  schema_bronze_fusion:
    description: Bronze tables shaped like Oracle Fusion Cloud native exports
    default: bronze_fusion
  schema_bronze_cms:
    description: Bronze tables shaped like the in-house contract management system
    default: bronze_cms
  schema_bronze_workday:
    description: Bronze tables shaped like Workday HCM native exports (HR workforce data)
    default: bronze_workday
  schema_silver:
    description: Cleaned, deduplicated, conformed entities across all three sources
    default: silver
  schema_gold:
    description: Denormalized facts and dims for business consumption
    default: gold
  schema_meta:
    description: Anchor tables and governance — dim_period_anchors and draft
    default: _meta
  schema_ml:
    description: ML feature tables and registered models (Phase 2)
    default: ml

  raw_volume:
    description: Managed volume name under the raw_data schema
    default: files

  warehouse_id:
    description: SQL warehouse ID used by the Sourcing Portal app (OBO queries)
    default: ""

sync:
  include:
    - apps/*/frontend/dist/**
    - apps/*/frontend/dist/ds/**
  exclude:
    - apps/*/frontend/node_modules/**
    - apps/*/.venv/**
    - "**/__pycache__/**"
    - "**/*.pyc"

targets:
  # Both targets use mode: production for deterministic resource naming. Dev/prod
  # separation is achieved by pointing at different catalogs (horizontal_finance_dev
  # vs horizontal_finance). This avoids DAB's development-mode auto-prefix preset,
  # which caused state-file drift when the prefix mechanic changed between deploys.
  dev:
    mode: production
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
      profile: DEFAULT
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    run_as:
      user_name: ${workspace.current_user.userName}
    variables:
      catalog: horizontal_finance_dev

  prod:
    mode: production
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
      profile: DEFAULT
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    run_as:
      user_name: ${workspace.current_user.userName}
