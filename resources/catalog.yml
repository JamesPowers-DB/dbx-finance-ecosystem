resources:
  catalogs:
    finance_demo:
      name: ${var.catalog}
      comment: >
        Helios Industrial Group demo — Honeywell-anchored, fully anonymized
        finance data ecosystem. Wave 1 horizontal GTM (F-1 Spend Visibility).

  schemas:
    raw_data:
      catalog_name: ${var.catalog}
      name: ${var.schema_raw}
      comment: >
        Raw landing zone. Single managed volume holds files from all sources —
        sap_ariba/ (CSV), oracle_fusion/ (CSV+Parquet), inhouse_cms/ (JSON),
        and filings/ (10-Q HTML for anchor extraction).

    bronze_ariba:
      catalog_name: ${var.catalog}
      name: ${var.schema_bronze_ariba}
      comment: >
        Bronze — SAP Ariba shape. ALL_CAPS with German codes (LIFNR, EBELN).
        1:1 with source files, plus _ingested_at audit column.

    bronze_fusion:
      catalog_name: ${var.catalog}
      name: ${var.schema_bronze_fusion}
      comment: >
        Bronze — Oracle Fusion Cloud shape. snake_case with classic prefixes
        (gl_je_, ap_, ar_, xla_). 1:1 with source files, plus audit columns.

    bronze_cms:
      catalog_name: ${var.catalog}
      name: ${var.schema_bronze_cms}
      comment: >
        Bronze — In-house contract management system. Clean flat snake_case.
        1:1 with source JSON, plus audit columns.

    silver:
      catalog_name: ${var.catalog}
      name: ${var.schema_silver}
      comment: >
        Cleaned, deduplicated, conformed entities (supplier, customer,
        purchase_order, invoice, contract, gl_journal_entry). Every row tagged
        with source_system / source_table / source_primary_key for lineage.

    gold:
      catalog_name: ${var.catalog}
      name: ${var.schema_gold}
      comment: >
        Denormalized facts and dims for business users. Reserves Phase 2 hooks
        (managed_spend_flag, supplier_canonical_id, unspsc_*, leakage flags).

    _meta:
      catalog_name: ${var.catalog}
      name: ${var.schema_meta}
      comment: >
        Anchor tables and governance. dim_period_anchors is the single source
        of truth for per-period financial targets that downstream generators
        reconcile against. dim_period_anchors_draft holds AI-extracted rows
        pending human review.

    ml:
      catalog_name: ${var.catalog}
      name: ${var.schema_ml}
      comment: >
        ML feature tables and registered models. Reserved for Phase 2 work —
        spend classification, supplier entity resolution, anomaly detection.

  volumes:
    raw_files:
      catalog_name: ${var.catalog}
      schema_name: ${var.schema_raw}
      name: ${var.raw_volume}
      volume_type: MANAGED
      comment: >
        Landing zone. Subdirectories — sap_ariba/, oracle_fusion/, inhouse_cms/,
        filings/raw/. Generators write here; bronze pipelines read from here.
