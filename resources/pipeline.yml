resources:
  pipelines:
    lakehouse:
      name: finance-demo-lakehouse-${bundle.target}
      catalog: ${var.catalog}
      schema: ${var.schema_silver}
      serverless: true
      continuous: false
      development: false
      photon: true
      libraries:
        # ---------------------------------------------------------------- spend
        - file: { path: ../pipelines/spend/bronze/ariba_procurement.sql }
        - file: { path: ../pipelines/spend/bronze/fusion_ap.sql }
        - file: { path: ../pipelines/spend/silver/purchase_order.sql }
        - file: { path: ../pipelines/spend/silver/invoice_ap.sql }
        - file: { path: ../pipelines/spend/silver/sourcing_event.sql }
        - file: { path: ../pipelines/spend/gold/fact_spend.sql }

        # -------------------------------------------------------------- revenue
        - file: { path: ../pipelines/revenue/bronze/fusion_ar.sql }
        - file: { path: ../pipelines/revenue/bronze/cms_billing.sql }
        - file: { path: ../pipelines/revenue/silver/invoice_ar.sql }
        - file: { path: ../pipelines/revenue/gold/fact_revenue.sql }

        # ----------------------------------------------------------- accounting
        - file: { path: ../pipelines/accounting/bronze/fusion_gl.sql }
        - file: { path: ../pipelines/accounting/silver/gl_journal.sql }
        - file: { path: ../pipelines/accounting/silver/coa_account.sql }
        - file: { path: ../pipelines/accounting/gold/dim_account.sql }
        - file: { path: ../pipelines/accounting/gold/dim_cost_center.sql }
        - file: { path: ../pipelines/accounting/gold/fact_gl_entries.sql }
        - file: { path: ../pipelines/accounting/gold/fact_trial_balance.sql }

        # ---------------------------------------------------------------- legal
        - file: { path: ../pipelines/legal/bronze/ariba_contract_workspace.sql }
        - file: { path: ../pipelines/legal/bronze/cms_contracts.sql }
        - file: { path: ../pipelines/legal/silver/contract_inbound.sql }
        - file: { path: ../pipelines/legal/silver/contract_outbound.sql }

        # ------------------------------------------------------- parties (master)
        - file: { path: ../pipelines/parties/bronze/ariba_supplier_master.sql }
        - file: { path: ../pipelines/parties/bronze/fusion_supplier_sites.sql }
        - file: { path: ../pipelines/parties/bronze/fusion_customer_sites.sql }
        - file: { path: ../pipelines/parties/silver/supplier.sql }
        - file: { path: ../pipelines/parties/silver/customer.sql }
        - file: { path: ../pipelines/parties/gold/dim_supplier.sql }
        - file: { path: ../pipelines/parties/gold/dim_customer.sql }

        # ------------------------------------------------------------------ fpa
        - file: { path: ../pipelines/fpa/gold/fact_fpa_actuals.sql }
        - file: { path: ../pipelines/fpa/gold/fact_fpa_budgets.sql }
        - file: { path: ../pipelines/fpa/gold/fact_fpa_forecasts.sql }

        # ------------------------------------------------------------------- hr
        - file: { path: ../pipelines/hr/bronze/workday_workers.sql }
        - file: { path: ../pipelines/hr/gold/dim_employees.sql }
        - file: { path: ../pipelines/hr/gold/fact_emp_quarterly_cost.sql }

        # ------------------------------------------------------------ reference
        - file: { path: ../pipelines/reference/gold/dim_segment.sql }
        - file: { path: ../pipelines/reference/gold/dim_date.sql }
        - file: { path: ../pipelines/reference/gold/dim_macro_environment.sql }

      configuration:
        # Exposed inside SQL files as ${catalog}, ${schema_bronze_ariba}, etc.
        catalog: ${var.catalog}
        schema_raw: ${var.schema_raw}
        schema_bronze_ariba: ${var.schema_bronze_ariba}
        schema_bronze_fusion: ${var.schema_bronze_fusion}
        schema_bronze_cms: ${var.schema_bronze_cms}
        schema_bronze_workday: ${var.schema_bronze_workday}
        schema_silver: ${var.schema_silver}
        schema_gold: ${var.schema_gold}
        schema_meta: ${var.schema_meta}
        raw_volume: ${var.raw_volume}
